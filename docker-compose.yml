# iAgents Hub — Despliegue con Docker
#
# Solo necesitas este fichero. El servicio code-sync mantiene el código
# actualizado desde GitHub cada SYNC_INTERVAL segundos — sin reconstruir
# la imagen ni tocar el YAML.
#
# ── Variables a revisar antes de desplegar ───────────────────────────────────
# GAIA_AGENTS_SECRET  → cambia el valor por una cadena aleatoria segura
# SKILLS_LANG         → idioma de las skills: es | en
# SYNC_INTERVAL       → segundos entre sincronizaciones de código (default: 3600)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Init: estructura de datos + skills ─────────────────────────────────────
  # Contenedor efímero que corre antes que el backend.
  # - Crea directorios y ficheros por defecto si no existen
  # - Clona el repo de skills o lo actualiza si ya está clonado
  data-init:
    image: alpine/git:2.52.0
    entrypoint: []
    volumes:
      - iagentshub_data:/data
    environment:
      SKILLS_REPO: "https://github.com/iagentshub/skills.git"
      SKILLS_LANG: "es"
      AGENTS_REPO: "https://github.com/iagentshub/agents.git"
    command:
      - /bin/sh
      - -c
      - |
        set -e

        echo '[data-init] Creando estructura de directorios...'
        mkdir -p /data/logs

        if [ ! -f /data/settings.json ]; then
          RANDOM_SECRET=$$(cat /dev/urandom | tr -dc 'a-f0-9' | head -c 64)
          printf '{"jwt_secret":"%s"}\n' "$$RANDOM_SECRET" > /data/settings.json
          echo '[data-init] settings.json creado con secret aleatorio.'
        fi


        echo '[data-init] Listo.'
    restart: "no"

  # ── Code sync: mantiene backend y frontend actualizados desde GitHub ────────
  # Corre continuamente: sincroniza en el arranque y luego cada SYNC_INTERVAL s.
  # El backend (uvicorn --reload) recarga ficheros automáticamente.
  # El frontend nginx sirve los ficheros del volumen directamente.
  code-sync:
    image: alpine/git:2.52.0
    entrypoint: []
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - iagentshub_backend:/backend
      - iagentshub_frontend:/frontend
    environment:
      BACKEND_REPO: "https://github.com/iagentshub/backend.git"
      FRONTEND_REPO: "https://github.com/iagentshub/frontend.git"
      SYNC_INTERVAL: "3600"
    command:
      - /bin/sh
      - -c
      - |
        sync_repo() {
          REPO="$$1"
          DIR="$$2"
          if [ -d "$$DIR/.git" ]; then
            git -C "$$DIR" fetch --depth=1 origin main 2>&1 && \
            git -C "$$DIR" reset --hard FETCH_HEAD 2>&1 && \
            echo "[code-sync] $$DIR actualizado ($$( git -C $$DIR rev-parse --short HEAD ))"
          else
            git clone --depth=1 --branch main "$$REPO" "$$DIR" && \
            echo "[code-sync] $$DIR clonado ($$( git -C $$DIR rev-parse --short HEAD ))"
          fi
        }

        echo '[code-sync] Sincronización inicial...'
        sync_repo "$$BACKEND_REPO" /backend
        sync_repo "$$FRONTEND_REPO" /frontend
        echo "[code-sync] Lista. Próxima sync en $$SYNC_INTERVAL s."

        while true; do
          sleep "$$SYNC_INTERVAL"
          echo '[code-sync] Sincronizando...'
          sync_repo "$$BACKEND_REPO" /backend
          sync_repo "$$FRONTEND_REPO" /frontend
        done
    healthcheck:
      test: [ "CMD", "test", "-f", "/backend/main.py" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── PostgreSQL (opcional — se activa cuando DATABASE_URL apunta a él) ──────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: iagentshub
      POSTGRES_USER: gaia
      POSTGRES_PASSWORD: "${GAIA_DB_PASSWORD:-changeme}"
    volumes:
      - iagentshub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gaia -d iagentshub" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + uvicorn) ────────────────────────────────────────────
  # La imagen solo contiene Python + dependencias.
  # El código de la app viene del volumen iagentshub_backend (gestionado por code-sync).
  # GAIA_RELOAD=false en producción — code-sync + reinicio del contenedor gestiona updates.
  # GAIA_WORKERS controla los workers de uvicorn (default 4).
  # Si requirements.txt cambia, reconstruye la imagen (docker compose up --build backend).
  backend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "15"
    build:
      context: /tmp
      dockerfile_inline: |
        FROM alpine/git AS source
        RUN git clone --depth=1 --branch main https://github.com/iagentshub/backend.git /repo

        FROM python:3.12-slim AS builder
        WORKDIR /build
        COPY --from=source /repo/requirements.txt .
        RUN pip install --no-cache-dir --prefix=/install -r requirements.txt

        FROM python:3.12-slim
        WORKDIR /app
        COPY --from=builder /install /usr/local
        EXPOSE 8765
        CMD ["python", "main.py"]
    environment:
      GAIA_DATA_DIR: "/data"
      GAIA_RELOAD: "false"
      GAIA_WORKERS: "4"
      GAIA_HOST: "0.0.0.0"
      GAIA_PORT: "8765"
      # ↓ Pon el dominio exacto del frontend (sin barra final)
      # Controla CORS, cookies seguras y OAuth redirect automáticamente.
      GAIA_FRONTEND_URL: "https://tu-dominio.com"
      # ↓ Genera con: openssl rand -hex 32  — NUNCA dejes este valor en el YAML público
      GAIA_AGENTS_SECRET: ""
      # ── Seguridad ────────────────────────────────────────────────────────────
      # Email del administrador inicial (se crea automáticamente si no existe ningún admin)
      GAIA_ADMIN_EMAIL: "admin@localhost"
      # Pon "true" para resetear la contraseña del admin en el próximo arranque (quitar después)
      GAIA_ADMIN_RESET: ""
      # open | closed | invite
      GAIA_REGISTRATION: "invite"
      # false → usuarios auto-verificados; true → envía correo de verificación
      GAIA_EMAIL_VERIFY: "false"
      # ── SMTP (verificación de email y recuperación de contraseña) ────────────
      # Dondominio: host=mail.dondominio.com  port=587  tls=starttls
      # Deja GAIA_SMTP_HOST vacío para deshabilitar (tokens se loguean en consola).
      GAIA_SMTP_HOST: ""
      GAIA_SMTP_PORT: "587"
      # Modo TLS: starttls (587, recomendado) | ssl (465) | none (25, solo redes internas)
      GAIA_SMTP_TLS: "starttls"
      GAIA_SMTP_USER: ""
      GAIA_SMTP_PASS: ""
      # Dirección "De:" del correo — si no se indica, se usa GAIA_SMTP_USER
      GAIA_SMTP_FROM: ""
      # URL del cliente de correo web (abre en nueva pestaña desde el panel admin)
      # Ejemplos: Dondominio → https://webmail.dondominio.com | Mailpit dev → http://localhost:8025
      GAIA_WEBMAIL_URL: ""
      # Tiempo de validez del enlace de recuperación (horas)
      GAIA_RESET_EXPIRE_HOURS: "1"
      # Máximo de sesiones guest simultáneas
      GAIA_MAX_GUEST_SESSIONS: "200"
      # postgresql://gaia:password@postgres:5432/iagentshub — leave empty for SQLite
      DATABASE_URL: ""
      GAIA_DB_PASSWORD: ""
    volumes:
      - iagentshub_backend:/app
      - iagentshub_data:/data
    depends_on:
      code-sync:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost',8765,timeout=5); c.request('GET','/api/auth/me'); r=c.getresponse(); exit(0 if r.status<500 else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (nginx sirviendo estáticos + proxy /api/) ────────────────────
  # La imagen es nginx vacío. Los ficheros estáticos y nginx.conf vienen del
  # volumen iagentshub_frontend (gestionado por code-sync).
  # nginx sirve los ficheros directamente del volumen → los cambios son instantáneos.
  # Nota: si nginx.conf cambia, reinicia este contenedor para que lo recargue.
  frontend:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "15"
    build:
      context: /tmp
      dockerfile_inline: |
        FROM nginx:alpine
        RUN rm -f /usr/share/nginx/html/index.html /usr/share/nginx/html/50x.html
        EXPOSE 80
    command:
      - sh
      - -c
      - "cp /usr/share/nginx/html/nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    volumes:
      - iagentshub_frontend:/usr/share/nginx/html
    ports:
      - "${PORT:-8007}:80"
    depends_on:
      code-sync:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  iagentshub_data:
  iagentshub_backend:
  iagentshub_frontend:
  iagentshub_postgres:
