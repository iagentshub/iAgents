# iAgents Hub — docker-compose.hub.yml
#
# Imagen unificada: backend (FastAPI) + frontend (nginx) en un solo contenedor.
#
# Instalación/actualización:
#   curl -fsSL https://raw.githubusercontent.com/iagentshub/iAgents/main/install.sh | bash

services:

  iagentshub:
    image: ${DOCKER_HUB_USER:-iagenthub}/app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "${PORT:-8007}:80"
    environment:
      GAIA_DATA_DIR:             "/data"
      GAIA_FRONTEND_URL:         "${GAIA_FRONTEND_URL:-http://localhost:8007}"
      GAIA_AGENTS_SECRET:        "${GAIA_AGENTS_SECRET:-}"
      GAIA_ADMIN_EMAIL:          "${GAIA_ADMIN_EMAIL:-admin@localhost}"
      GAIA_ADMIN_RESET:          "${GAIA_ADMIN_RESET:-}"
      GAIA_REGISTRATION:         "${GAIA_REGISTRATION:-closed}"
      GAIA_EMAIL_VERIFY:         "${GAIA_EMAIL_VERIFY:-false}"
      GAIA_SMTP_HOST:            "${GAIA_SMTP_HOST:-}"
      GAIA_SMTP_PORT:            "${GAIA_SMTP_PORT:-587}"
      GAIA_SMTP_TLS:             "${GAIA_SMTP_TLS:-starttls}"
      GAIA_SMTP_USER:            "${GAIA_SMTP_USER:-}"
      GAIA_SMTP_PASS:            "${GAIA_SMTP_PASS:-}"
      GAIA_SMTP_FROM:            "${GAIA_SMTP_FROM:-}"
      GAIA_WEBMAIL_URL:          "${GAIA_WEBMAIL_URL:-}"
      GAIA_RESET_EXPIRE_HOURS:   "${GAIA_RESET_EXPIRE_HOURS:-1}"
      GAIA_MAX_GUEST_SESSIONS:   "${GAIA_MAX_GUEST_SESSIONS:-0}"
      DATABASE_URL:              "${DATABASE_URL:-}"
      GAIA_TRUSTED_PROXIES:      "127.0.0.1"
      STRIPE_SECRET_KEY:         "${STRIPE_SECRET_KEY:-}"
      STRIPE_PUBLISHABLE_KEY:    "${STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_WEBHOOK_SECRET:     "${STRIPE_WEBHOOK_SECRET:-}"
      API_BASE:                  ""
    volumes:
      - iagentshub_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import http.client; c=http.client.HTTPConnection('localhost',8765,timeout=5); c.request('GET','/api/health'); r=c.getresponse(); exit(0 if r.status<500 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL (opcional) ─────────────────────────────────────────────────
  # Descomenta este bloque para usar PostgreSQL en lugar de SQLite.
  # GAIA_DB_PASSWORD ya está en tu .env (generado aleatoriamente al instalar).
  # Actualiza DATABASE_URL con ese valor:
  #   DATABASE_URL=postgresql://gaia:<GAIA_DB_PASSWORD>@postgres:5432/iagentshub
  #
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: iagentshub
  #     POSTGRES_USER: gaia
  #     POSTGRES_PASSWORD: "${GAIA_DB_PASSWORD:?Define GAIA_DB_PASSWORD en .env}"
  #   volumes:
  #     - iagentshub_postgres:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U gaia -d iagentshub"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  iagentshub_data:
  # iagentshub_postgres:
